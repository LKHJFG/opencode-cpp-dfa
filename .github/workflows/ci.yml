name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

defaults:
  run:
    working-directory: static-analysis-plugin

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: static-analysis-plugin/node_modules
          key: bun-${{ hashFiles('static-analysis-plugin/bun.lock') }}

      - run: bun install

      - name: TS Check
        run: |
          bun run tsc --noEmit 2>&1 | tee ts-errors.log; ec=${PIPESTATUS[0]}
          echo "tsc_exit=$ec" >> $GITHUB_ENV
          if [ $ec -ne 0 ]; then
            echo "### tsc errors" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat ts-errors.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          # Show exit in log regardless
          echo "TSC_EXIT_CODE=$ec"
          exit $ec

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build
