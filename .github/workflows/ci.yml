name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

defaults:
  run:
    working-directory: static-analysis-plugin

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: static-analysis-plugin/node_modules
          key: bun-${{ hashFiles('static-analysis-plugin/bun.lock') }}

      - run: bun install

      - name: Debug node_modules
        run: |
          ls node_modules/.bin/ | head -20
          node_modules/.bin/tsc --version 2>&1 || echo "tsc not found"
          bun --version
      - name: Type check
        run: node_modules/.bin/tsc --noEmit 2>&1

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build
