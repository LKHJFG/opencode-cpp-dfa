name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

defaults:
  run:
    working-directory: static-analysis-plugin

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: static-analysis-plugin/node_modules
          key: bun-${{ hashFiles('static-analysis-plugin/bun.lock') }}

      - run: bun install

      - name: Type check
        run: |
          echo "=== tsc version ==="
          node_modules/.bin/tsc --version
          echo "=== tsconfig ==="
          cat tsconfig.json
          echo "=== source files ==="
          find src -name '*.ts' -not -path '*/__tests__/*' | sort
          echo "=== tsc with verbose ==="
          node_modules/.bin/tsc --noEmit --verbose 2>&1 || true
          echo "=== tsc strict ==="
          node_modules/.bin/tsc --noEmit 2>&1; ec=$?; echo "EXIT_CODE=$ec"; exit $ec

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build
