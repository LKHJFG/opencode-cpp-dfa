name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

defaults:
  run:
    working-directory: static-analysis-plugin

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: static-analysis-plugin/node_modules
          key: bun-${{ hashFiles('static-analysis-plugin/bun.lock') }}

      - run: bun install

      - name: TS Check
        id: tscheck
        run: |
          bun run tsc --noEmit >tsc-all.txt 2>&1; ec=$?
          echo "=== TSC OUTPUT (stdout+stderr combined) ==="
          cat tsc-all.txt
          echo "=== TSC EXIT: $ec ==="
          echo "tsc_exit=$ec" >> $GITHUB_OUTPUT
          exit $ec
      - name: Upload tsc error log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tsc-errors-v2
          path: static-analysis-plugin/tsc-all.txt

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build
